<!DOCTYPE html>
<html lang="cs">
<head>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ELAI</title>

<script src="https://cdn.tailwindcss.com"></script>

<style>
* {
  box-sizing: border-box;
}

html {
  color-scheme: dark;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

body {
  margin: 0;
  min-height: 100vh;
  background:
    radial-gradient(circle at 18% 12%, rgba(255, 105, 180, 0.14), transparent 20%),
    radial-gradient(circle at 82% 8%, rgba(168, 85, 247, 0.12), transparent 18%),
    radial-gradient(circle at 50% 108%, rgba(99, 102, 241, 0.12), transparent 26%),
    linear-gradient(180deg, #090b14 0%, #0b1020 42%, #10192a 100%);
  background-attachment: fixed;
  color: #f8ecff;
  overflow-x: hidden;
  position: relative;
}

body > .wallpaper-layer {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  background-image: url("img/food-wallpaper.png");
  background-repeat: repeat;
  background-size: 260px 260px;
  background-position: center;
  opacity: 0.26;
  filter: saturate(1.12) brightness(1.02) contrast(1.02);
}

body > .aurora-layer {
  position: fixed;
  inset: -10%;
  pointer-events: none;
  z-index: 0;
  background:
    radial-gradient(circle at 18% 20%, rgba(255, 118, 196, 0.22), transparent 18%),
    radial-gradient(circle at 78% 16%, rgba(174, 96, 255, 0.20), transparent 20%),
    radial-gradient(circle at 50% 82%, rgba(80, 113, 255, 0.16), transparent 22%),
    radial-gradient(circle at 50% 50%, rgba(255, 255, 255, 0.05), transparent 45%);
  filter: blur(38px) saturate(1.2);
  opacity: 0.72;
  animation: floatAurora 18s ease-in-out infinite alternate;
}

body::before,
body::after {
  content: "";
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
}

body::before {
  background:
    radial-gradient(circle at 20% 20%, rgba(255,255,255,0.06), transparent 18%),
    radial-gradient(circle at 70% 15%, rgba(244,114,182,0.08), transparent 22%),
    radial-gradient(circle at 50% 70%, rgba(255,255,255,0.03), transparent 25%);
  filter: blur(12px);
}

body::after {
  background-image:
    radial-gradient(circle at 50% 50%, rgba(255,255,255,0.03), transparent 45%),
    radial-gradient(circle at 35% 25%, rgba(255,255,255,0.02), transparent 18%),
    radial-gradient(circle at 75% 70%, rgba(255,255,255,0.02), transparent 18%);
  opacity: 0.45;
}
.glass {
  position: relative;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.18), rgba(255,255,255,0.04)),
    linear-gradient(180deg, rgba(244,114,182,0.08), rgba(168,85,247,0.04)),
    rgba(18, 26, 48, 0.52);
  border: 1px solid rgba(255,255,255,0.20);
  border-radius: 30px;
  backdrop-filter: blur(32px) saturate(1.18);
  -webkit-backdrop-filter: blur(32px) saturate(1.18);
  box-shadow:
    0 30px 85px rgba(0,0,0,0.28),
    inset 0 1px 0 rgba(255,255,255,0.34),
    inset 0 -1px 0 rgba(255,255,255,0.06);
  overflow: hidden;
}

.glass::before {
  content: "";
  position: absolute;
  inset: 1px;
  background:
    radial-gradient(circle at 24% 18%, rgba(255,255,255,0.30), transparent 34%),
    linear-gradient(135deg, rgba(255,255,255,0.14), transparent 38%);
  pointer-events: none;
  opacity: 0.78;
}

.timeline-wrapper {
  position: relative;
  display: flex;
  align-items: center;
  overflow-x: auto;
  overflow-y: visible;
  scroll-snap-type: x proximity;
  padding: 16px 20px 10px;
  gap: 10px;
  margin-top: 2px;
}

.timeline-bubble {
  scroll-snap-align: center;
  padding: 11px 18px;
  border-radius: 999px;
  min-width: 142px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)),
    linear-gradient(180deg, rgba(244,114,182,0.08), rgba(168,85,247,0.06)),
    rgba(18,25,45,0.38);
  border: 1px solid rgba(255,255,255,0.16);
  backdrop-filter: blur(26px) saturate(1.12);
  -webkit-backdrop-filter: blur(26px) saturate(1.12);
  box-shadow:
    0 16px 44px rgba(0,0,0,0.18),
    inset 0 1px 0 rgba(255,255,255,0.28);
  transition: transform 0.25s ease, opacity 0.25s ease;
  transform-origin: center;
  opacity: 0.42;
}

.timeline-bubble-date {
  font-size: 10px;
  opacity: 0.62;
  letter-spacing: 0.02em;
}

.timeline-bubble-meal {
  font-size: 13px;
  font-weight: 600;
  margin-top: 4px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  max-width: 110px;
}

.timeline-bubble.today {
  box-shadow:
    0 0 0 1px rgba(255,255,255,0.12),
    0 20px 50px rgba(0,0,0,0.22);
}

.input-wrapper {
  position: fixed;
  bottom: 16px;
  left: 50%;
  transform: translateX(-50%);
  width: 94%;
  max-width: 520px;
  display: flex;
  align-items: center;
  gap: 8px;
  background:
    linear-gradient(180deg, rgba(255,255,255,0.12), rgba(255,255,255,0.04)),
    linear-gradient(180deg, rgba(244,114,182,0.10), rgba(168,85,247,0.06)),
    rgba(18,25,45,0.58);
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 999px;
  backdrop-filter: blur(32px) saturate(1.16);
  -webkit-backdrop-filter: blur(32px) saturate(1.16);
  padding: 8px 10px;
  box-shadow:
    0 22px 60px rgba(0,0,0,0.26),
    inset 0 1px 0 rgba(255,255,255,0.24);
}

.input-wrapper input::placeholder {
  color: rgba(244,231,255,0.66);
}

#chatSection::-webkit-scrollbar {
  width: 4px;
}

#chatSection::-webkit-scrollbar-thumb {
  background: rgba(216,180,254,0.38);
  border-radius: 10px;
}

.timeline-wrapper::-webkit-scrollbar {
  display: none;
}

.timeline-wrapper {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.user-bubble {
  position: relative;
  box-shadow:
    0 18px 42px rgba(168,85,247,0.20),
    inset 0 1px 0 rgba(255,255,255,0.30),
    inset 0 -1px 0 rgba(0,0,0,0.08);
  background:
    linear-gradient(135deg, rgba(255, 118, 196, 0.95), rgba(168, 85, 247, 0.95) 48%, rgba(99, 102, 241, 0.95));
  border: 1px solid rgba(255,255,255,0.18);
  border-radius: 26px;
}

.assistant-bubble {
  background:
    linear-gradient(180deg, rgba(255,255,255,0.15), rgba(255,255,255,0.05)),
    rgba(22, 29, 50, 0.58);
  border: 1px solid rgba(255,255,255,0.16);
  border-radius: 28px;
  box-shadow:
    0 18px 44px rgba(0,0,0,0.20),
    inset 0 1px 0 rgba(255,255,255,0.24);
}

#chatSection {
  position: relative;
  z-index: 1;
}

@keyframes floatAurora {
  from {
    transform: translate3d(0, 0, 0) scale(1);
  }
  to {
    transform: translate3d(0, -12px, 0) scale(1.03);
  }
}

.timeline-wrapper,
.input-wrapper,
header {
  position: relative;
  z-index: 1;
}

header img {
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.28));
}
</style>
</head>

<body class="flex flex-col h-screen text-fuchsia-50 overflow-hidden">

<div class="wallpaper-layer" aria-hidden="true"></div>
<div class="aurora-layer" aria-hidden="true"></div>

<!-- LOGO -->
<header class="w-full flex justify-center leading-none pt-2">
  <img src="img/ELAI.png"
     class="block max-w-[168px] w-full h-auto object-contain opacity-95 m-0 p-0" />
</header>


<!-- TIMELINE -->
<div class="timeline-wrapper" id="historySection">
</div>

<!-- CHAT -->
<div id="chatSection"
     class="flex-1 overflow-y-auto px-4 sm:px-6 pt-4 space-y-5 max-w-2xl mx-auto"
     style="padding-bottom: 140px;">
</div>



<!-- FLOATING INPUT -->
<div class="input-wrapper">
  <input id="messageInput"
         type="text"
         placeholder="Tak co mi dneska naserv&#237;ruje&#353;?"
         class="flex-1 bg-transparent text-fuchsia-50 px-6 py-3 text-[15px] focus:outline-none" />

    <button id="sendButton" onclick="sendMessage()"
            class="w-11 h-11 flex items-center justify-center rounded-full bg-gradient-to-br from-fuchsia-500 via-violet-600 to-indigo-700 text-white shadow-md hover:scale-105 transition">

      <svg xmlns="http://www.w3.org/2000/svg" 
          class="w-[18px] h-[18px]"
          viewBox="0 0 24 24" 
          fill="currentColor">
        <path d="M3 20v-6l15-2-15-2V4l19 8-19 8z"/>
      </svg>

    </button>

</div>

function applyTilt(element) {
  element.addEventListener("mousemove", (e) => {
    const rect = element.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const rotateX = ((y / rect.height) - 0.5) * -2.5;
    const rotateY = ((x / rect.width) - 0.5) * 2.5;

    element.style.transform =
      `rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

    element.querySelector("::before");
  });

  element.addEventListener("mouseleave", () => {
    element.style.transform = "rotateX(0deg) rotateY(0deg)";
  });

  await loadHistory();
  await loadSession();

/* HISTORY */
async function loadHistory() {
  try {
    const res = await fetch(`${API_BASE}/history`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const history = data.history || [];
    renderHistory(filterLast14Days(history));
  } catch (err) {
    console.error("loadHistory failed:", err);
  }
}

function filterLast14Days(history) {
  const now = new Date();
  return history.filter(item => {
    const d = new Date(item.date);
    return (now - d) / (1000 * 60 * 60 * 24) <= 14;
  });
}

function renderHistory(items) {
  const container = document.getElementById("historySection");
  container.innerHTML = "";

  if (!items.length) return;

  const today = new Date().toISOString().slice(0,10);
  items.sort((a,b)=> new Date(a.date) - new Date(b.date));

  let lastTodayBubble = null;

  items.forEach(item => {

    const bubble = document.createElement("div");
    bubble.className = "timeline-bubble";

    if (item.date === today) {
      bubble.classList.add("today");
      lastTodayBubble = bubble;
    }

    const dateDiv = document.createElement("div");
    dateDiv.className = "timeline-bubble-date";
    dateDiv.innerText = item.date;

    const mealDiv = document.createElement("div");
    mealDiv.className = "timeline-bubble-meal";
    mealDiv.innerText = item.meal_name || item.meal_id;

    bubble.appendChild(dateDiv);
    bubble.appendChild(mealDiv);
    container.appendChild(bubble);

    if (item.date === today) {
      setTimeout(() => {
        bubble.scrollIntoView({
          inline: "center",
          behavior: "auto"
        });
      }, 0);

/* WAU depth effect */
function updateTimelineScale(container) {
  const bubbles = container.querySelectorAll(".timeline-bubble");
  const center = container.scrollLeft + container.offsetWidth / 2;

  bubbles.forEach(bubble => {
    const bubbleCenter =
      bubble.offsetLeft + bubble.offsetWidth / 2;

    const distance = Math.abs(center - bubbleCenter);
    const maxDistance = container.offsetWidth / 2;

    const ratio = Math.max(0, 1 - distance / maxDistance);

    const scale = 0.7 + ratio * 0.5;
    const opacity = 0.2 + ratio * 0.8;

    bubble.style.transform = `scale(${scale})`;
    bubble.style.opacity = opacity;

async function loadSession() {
  try {
    const res = await fetch(`${API_BASE}/session`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    const today = new Date().toISOString().slice(0,10);
    const session = (data.sessions || []).find(s => s.date === today);
    if (session) renderChat(session.messages);
  } catch (err) {
    console.error("loadSession failed:", err);
  }
}

function renderChat(messages) {
  const chat = document.getElementById("chatSection");
  chat.innerHTML = "";
  messages.forEach(msg => appendMessage(msg.role, msg.content));
  setTimeout(scrollChatToBottom, 50);
}

function appendMessage(role, content) {
  const chat = document.getElementById("chatSection");
  const wrapper = document.createElement("div");
  wrapper.className = role === "user"
    ? "flex justify-end"
    : "flex justify-start";

  const bubble = document.createElement("div");
  bubble.className = `${
    role === "assistant" ? "assistant-bubble glass text-fuchsia-50 tilt" : "user-bubble text-white"
  }
    max-w-[70%] px-5 py-3
    animate-[fadeIn_0.3s_ease]
    transition-all duration-300 ease-out whitespace-pre-wrap break-words`;
  bubble.textContent = content;
  wrapper.appendChild(bubble);


  chat.appendChild(wrapper);
}

function scrollChatToBottom() {
  const chat = document.getElementById("chatSection");
  chat.scrollTop = chat.scrollHeight;
}

function setComposerDisabled(disabled) {
  const input = document.getElementById("messageInput");
  const button = document.getElementById("sendButton");

  input.disabled = disabled;
  input.classList.toggle("opacity-60", disabled);
  input.classList.toggle("cursor-not-allowed", disabled);

  if (button) {
    button.disabled = disabled;
    button.classList.toggle("opacity-70", disabled);
    button.classList.toggle("cursor-not-allowed", disabled);

async function sendMessage() {
  const input = document.getElementById("messageInput");
  const message = input.value.trim();
  if (!message) return;

  appendMessage("user", message);
  input.value = "";
  scrollChatToBottom();

  showLoading();
  setComposerDisabled(true);

  try {
    const res = await fetch(`${API_BASE}/chat`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ message })
    });

    if (!res.ok) {
      throw new Error(await res.text());
    }

    const data = await res.json();
    appendMessage("assistant", data.reply || "Backend vr\u00E1til pr\u00E1zdnou odpov\u011B\u010F.");
    await loadHistory();
    setTimeout(scrollChatToBottom, 50);

  } catch (err) {
    console.error("sendMessage failed:", err);
    appendMessage("assistant", "Backend te\u010F neodpov\u00EDd\u00E1. Zkus to pros\u00EDm znovu za chv\u00EDli.");
  } finally {
    hideLoading();
    setComposerDisabled(false);
  }
}

document.getElementById("messageInput")
  .addEventListener("keypress", function(e) {
    if (e.key === "Enter") sendMessage();
  });

/* ===========================
   VISION DEPTH ACTIVATION
=========================== */

function enableTiltEffects() {
  const elements = document.querySelectorAll(".tilt:not([data-tilt])");

  elements.forEach(el => {

    el.dataset.tilt = "true";


    el.addEventListener("mousemove", (e) => {
      const rect = el.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;

      const rotateX = ((y / rect.height) - 0.5) * -2.5;
      const rotateY = ((x / rect.width) - 0.5) * 2.5;

      el.style.transform =
        `perspective(800px) rotateX(${rotateX}deg) rotateY(${rotateY}deg)`;

      const lightX = (x / rect.width) * 100;
      const lightY = (y / rect.height) * 100;

      el.style.setProperty(
        "--light",
        `${lightX}% ${lightY}%`
      );
    });

    el.addEventListener("mouseleave", () => {
      el.style.transform =
        "perspective(800px) rotateX(0deg) rotateY(0deg)";
    });
