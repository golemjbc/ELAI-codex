<!DOCTYPE html>
<html lang="cs">
<head>
<link rel="manifest" href="./manifest.json">
<meta name="theme-color" content="#0f172a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>ELAI</title>

<script src="https://cdn.tailwindcss.com"></script>
<link rel="stylesheet" href="./styles.css">
<script src="./app.js" defer></script>
</head>

<body class="flex flex-col h-screen text-fuchsia-50 overflow-hidden">

<div class="wallpaper-layer" aria-hidden="true"></div>
<div class="aurora-layer" aria-hidden="true"></div>

<!-- Logo -->
<header class="w-full flex justify-center leading-none pt-2">
  <img src="img/ELAI.png"
     class="block max-w-[168px] w-full h-auto object-contain opacity-95 m-0 p-0" />
</header>


<!-- Časová osa -->
<div class="timeline-wrapper" id="historySection">
</div>

<!-- Chat -->
<div id="chatSection"
     class="flex-1 overflow-y-auto px-4 sm:px-6 pt-4 space-y-5 max-w-2xl mx-auto">
</div>



<!-- Plovoucí vstup -->
<div class="input-wrapper">
  <input id="messageInput"
         type="text"
         placeholder="Tak co mi dneska naserv&#237;ruje&#353;?"
         class="flex-1 bg-transparent text-fuchsia-50 px-6 py-3 text-[15px] focus:outline-none" />

    <button onclick="tryLuck()"
            class="w-11 h-11 flex items-center justify-center rounded-full bg-white/10 backdrop-blur-md border border-white/20 shadow-md hover:scale-105 transition bg-center bg-cover bg-no-repeat"
            style="background-image: url('img/elai-button.png');"></button>

    <button id="sendButton" onclick="sendMessage()"
            class="w-11 h-11 flex items-center justify-center rounded-full bg-gradient-to-br from-fuchsia-500 via-violet-600 to-indigo-700 text-white shadow-md hover:scale-105 transition">

      <svg xmlns="http://www.w3.org/2000/svg" 
          class="w-[18px] h-[18px]"
          viewBox="0 0 24 24" 
          fill="currentColor">
        <path d="M3 20v-6l15-2-15-2V4l19 8-19 8z"/>
      </svg>

    </button>

</div>

<div id="appVersion"></div>

</body>
</html>
